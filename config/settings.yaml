model:
  name: SDEN_CLIP
  dim: 512  # CLIP通常使用512维
  device: cuda
  text_encoder: clip-vit-base-patch32  # 常用CLIP模型

# -----------------------------
# DATASET CONFIGURATION
# -----------------------------
dataset:
  name: flickr30k_entities
  split: test
  root: /root/onethingai-tmp/CoGR-MoE/data
  image_root: /root/onethingai-tmp/CoGR-MoE/data/flickr30k_entities/raw/images

# -----------------------------
# EVALUATION SETTINGS
# -----------------------------
eval:
  save_dir: results
  cache_dir: embeddings_cache
  top_k: [1, 5, 10]
  metrics: [recall, hit, mrr, map, r_precision, ndcg]
  resume: true
  save_every_n: 10
